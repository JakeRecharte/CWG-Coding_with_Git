# .github/workflows/security.yml
name: Security

on:
    pull_request:
    push:
        branches: [main]
    schedule:
        - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC — catch newly disclosed CVEs

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dependency-review:
        name: Dependency review
        runs-on: ubuntu-latest
        # Only meaningful on PRs — compares the base and head dependency graphs.
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/dependency-review-action@v5
              with:
                  fail-on-severity: high # fail on HIGH and CRITICAL

    pip-audit:
        name: pip-audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
            # Resolves the project's dependencies and audits them against the
            # PyPA Advisory Database; fails the job on any known vulnerability.
            - uses: pypa/gh-action-pip-audit@v1.1.0
              with:
                  inputs: .
