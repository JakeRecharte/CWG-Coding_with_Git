# .github/workflows/tests.yml
name: Tests

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false # let every version finish so you see the full picture
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"] # test all supported versions
        steps:
            - uses: actions/checkout@v6 # 1. grab your code

            - uses: actions/setup-python@v6 # 2. install Python
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: pip # cache downloaded packages between runs

            - run: pip install -e ".[dev]" # 3. install CWG + its deps + dev deps (pytest)

            - run: pytest # 4. run the suite
